<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 300" fill="none" aria-label="goocampus">
  <title>goocampus</title>
  <!-- Stylized 3D isometric graduation cap forming a G -->
  <!-- Top orange surface of the cap (diamond/rhombus) -->
  <path d="M130 28 L226 76 L130 124 L34 76 Z" fill="#F58220"/>
  <!-- Inner negative space (white) to suggest G opening on top -->
  <path d="M130 50 L196 82 L130 114 L86 92 L86 78 L130 100 L172 80 L130 60 L86 78 L86 70 Z" fill="#FFFFFF"/>
  <!-- Right vertical orange band (back-right edge of cap) -->
  <path d="M218 80 L226 76 L226 130 L218 134 Z" fill="#F58220"/>
  <!-- Left vertical orange band (back-left edge) -->
  <path d="M34 76 L42 80 L42 134 L34 130 Z" fill="#F58220" opacity="0.92"/>
  <!-- Blue bottom band (front of cap base) -->
  <path d="M42 134 L130 178 L218 134 L218 178 L130 222 L42 178 Z" fill="#1E3A8A"/>
  <!-- Blue inner depth on the left -->
  <path d="M42 178 L60 188 L60 144 L42 134 Z" fill="#1E3A8A" opacity="0.85"/>
  <!-- Blue inner depth on the right -->
  <path d="M218 178 L200 188 L200 144 L218 134 Z" fill="#1E3A8A" opacity="0.85"/>
  <!-- Blue tassel cord (vertical line on the right) -->
  <rect x="200" y="76" width="6" height="98" fill="#1E3A8A"/>
  <!-- Tassel orange tip -->
  <rect x="196" y="172" width="14" height="14" fill="#F58220"/>

  <!-- "goocampus" wordmark -->
  <g font-family="Inter, 'Segoe UI', sans-serif" font-weight="800" font-size="58" letter-spacing="-1.5">
    <text x="18" y="278" fill="#F58220">goo</text>
    <text x="118" y="278" fill="#1A1A1A">campus</text>
  </g>
</svg>
